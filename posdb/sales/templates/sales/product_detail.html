<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ព័ត៌មានលម្អិតផលិតផល</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .product-card {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .category-badge {
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
        .info-group {
            border-bottom: 1px solid #f0f0f0;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-label { color: #70757a; font-size: 0.95rem; }
        .info-value { font-weight: 600; color: #202124; }
        .price-value { color: #1a73e8; font-size: 1.2rem; }
        .status-active { color: #1e8e3e; font-weight: bold; }
        .back-btn {
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            color: #5f6368;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="product-card">
        <h1 class="fw-bold mb-1">{{ product.name|capfirst }}</h1>
        <div class="category-badge">អាហារ និងភេសជ្ជៈ</div>

        <div class="mt-4">
            <div class="info-group">
                <span class="info-label">Price</span>
                <span class="info-value price-value">${{ product.price }}</span>
            </div>

            <div class="info-group">
                <span class="info-label">Stock</span>
                <span class="info-value">
                    <span class="text-success">✔</span> {{ product.stock }} units in stock
                </span>
            </div>

            <div class="info-group">
                <span class="info-label">Category</span>
                <span class="info-value">អាហារ និងភេសជ្ជៈ</span>
            </div>

            <div class="info-group">
                <span class="info-label">Barcode</span>
                <span class="info-value">—</span>
            </div>

            <div class="info-group">
                <span class="info-label">Status</span>
                <span class="info-value status-active">
                    {% if product.is_active %} Active {% else %} Inactive {% endif %}
                </span>
            </div>
        </div>

        <a href="{% url 'product_list' %}" class="back-btn">← Back to Products</a>
    </div>
</div>

</body>
</html>
